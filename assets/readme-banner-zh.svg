<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="360" viewBox="0 0 1280 360" role="img" aria-labelledby="title desc">
  <title id="title">PDCA Skill Creator Chinese Banner</title>
  <desc id="desc">A slim Chinese banner for PDCA Skill Creator.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="360" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B1220"/>
      <stop offset="0.52" stop-color="#12303A"/>
      <stop offset="1" stop-color="#234C3E"/>
    </linearGradient>
    <linearGradient id="accent" x1="770" y1="92" x2="1110" y2="276" gradientUnits="userSpaceOnUse">
      <stop stop-color="#14B8A6"/>
      <stop offset="0.52" stop-color="#38BDF8"/>
      <stop offset="1" stop-color="#A3E635"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="360" rx="28" fill="url(#bg)"/>
  <circle cx="1090" cy="70" r="160" fill="#38BDF8" opacity="0.08"/>
  <circle cx="60" cy="320" r="170" fill="#A3E635" opacity="0.08"/>
  <g transform="translate(80 72)" font-family="Inter, Microsoft YaHei, Noto Sans CJK SC, Segoe UI, Arial, sans-serif">
    <text y="28" fill="#A7F3D0" font-size="20" font-weight="800" letter-spacing="2">CODEX SKILL</text>
    <text y="98" fill="#F8FAFC" font-size="58" font-weight="850">PDCA 技能创建器</text>
    <text y="148" fill="#D8F3DC" font-size="26">把重复流程沉淀为可执行、可检查、可复盘、可进化的技能。</text>
    <g transform="translate(0 190)" font-size="18" font-weight="700">
      <rect width="112" height="38" rx="19" fill="#CCFBF1"/><text x="56" y="25" text-anchor="middle" fill="#0F766E">计划</text>
      <rect x="130" width="112" height="38" rx="19" fill="#E0F2FE"/><text x="186" y="25" text-anchor="middle" fill="#0369A1">执行</text>
      <rect x="260" width="112" height="38" rx="19" fill="#ECFCCB"/><text x="316" y="25" text-anchor="middle" fill="#4D7C0F">检查</text>
      <rect x="390" width="112" height="38" rx="19" fill="#EDE9FE"/><text x="446" y="25" text-anchor="middle" fill="#6D28D9">复盘</text>
    </g>
  </g>
  <g transform="translate(804 74)">
    <circle cx="150" cy="106" r="100" fill="none" stroke="#F8FAFC" stroke-opacity="0.12" stroke-width="22"/>
    <path d="M150 6a100 100 0 0 1 96 72" fill="none" stroke="url(#accent)" stroke-width="22" stroke-linecap="round"/>
    <path d="M248 118a100 100 0 0 1-66 83" fill="none" stroke="#A3E635" stroke-width="22" stroke-linecap="round"/>
    <path d="M126 204a100 100 0 0 1-75-74" fill="none" stroke="#38BDF8" stroke-width="22" stroke-linecap="round"/>
    <path d="M54 91a100 100 0 0 1 70-80" fill="none" stroke="#14B8A6" stroke-width="22" stroke-linecap="round"/>
    <rect x="92" y="60" width="116" height="104" rx="20" fill="#F8FAFC"/>
    <path d="M121 113l22 22 42-50" fill="none" stroke="#0F766E" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="150" y="246" text-anchor="middle" fill="#CBD5E1" font-family="Microsoft YaHei, Noto Sans CJK SC, Segoe UI, Arial, sans-serif" font-size="18">证据驱动 · 控制上下文成本</text>
